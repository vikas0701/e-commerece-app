# ---------------------------------------------------------
# USER SERVICE DATABASE CONFIGURATION
# ---------------------------------------------------------

# MySQL database URL for user service
spring.datasource.url=jdbc:mysql://mysql:3306/user_db

# Database username
spring.datasource.username=root

# Database password
spring.datasource.password=root

# Hibernate dialect for MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Automatically update tables
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
spring.jpa.show-sql=true


# Secret key used to sign JWT
jwt.secret=MySuperSecretKeyForJwt123456789MySuperSecretKeyForJwt123456789MySuperSecretKeyForJwt123456789

# Access token expiration (15 minutes)
jwt.expiration=900000

# Refresh token expiration (7 days)
jwt.refresh-expiration=604800000

spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=user-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
