spring.application.name=inventory-service
spring.config.import=optional:configserver:http://localhost:8888

server.port=8084

# Kafka Broker
spring.kafka.bootstrap-servers=localhost:9092

# Consumer Config
spring.kafka.consumer.group-id=inventory-group-v4
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Producer Config
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.instance.instance-id=${spring.application.name}:${random.value}

#spring.kafka.consumer.properties.spring.json.trusted.packages=com.ecommerce.common.event
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type= com.ecommerce.common.events.OrderEvent

# expose actuator endpoints
management.endpoints.web.exposure.include=*

# enable prometheus endpoint
management.endpoint.prometheus.enabled=true

# show health details
management.endpoint.health.show-details=always

# add application name in metrics
management.metrics.tags.application=${spring.application.name}

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans