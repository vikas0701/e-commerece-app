# ---------------------------------------------------------
# BASIC SETTINGS
# ---------------------------------------------------------

# Service name registered in Eureka
spring.application.name=api-gateway

# Port for gateway (entry point for frontend)
server.port=8080


# ---------------------------------------------------------
# EUREKA CONFIGURATION
# ---------------------------------------------------------

# URL of discovery server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Register gateway in Eureka
eureka.client.register-with-eureka=true

# Fetch registry to know available services
eureka.client.fetch-registry=true


# ---------------------------------------------------------
# GATEWAY ROUTING CONFIGURATION
# ---------------------------------------------------------

# Enable automatic route mapping using service names
spring.cloud.gateway.discovery.locator.enabled=true

# Convert service names to lowercase in URL
spring.cloud.gateway.discovery.locator.lower-case-service-id=true


# ---------------------------------------------------------
# ACTUATOR (Optional but helpful)
# ---------------------------------------------------------

management.endpoints.web.exposure.include=*

#spring.cloud.gateway.discovery.locator.enabled=false

spring.cloud.gateway.routes[0].id=user-service-route
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

# Product service route
spring.cloud.gateway.routes[1].id=product-service-route
spring.cloud.gateway.routes[1].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**

spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/orders/**


# Same secret used in user-service
jwt.secret=MySuperSecretKeyForJwt123456789MySuperSecretKeyForJwt123456789MySuperSecretKeyForJwt123456789

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}


resilience4j.ratelimiter.instances.apiLimiter.limitForPeriod=10
resilience4j.ratelimiter.instances.apiLimiter.limitRefreshPeriod=5s
resilience4j.ratelimiter.instances.apiLimiter.timeoutDuration=0