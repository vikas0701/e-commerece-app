version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - ecommerce-network

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ecommerce-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - ecommerce-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ecommerce-network

  discovery-server:
    build: ./discovery-server
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 5

  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    depends_on:
      discovery-server:
        condition: service_started
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - ecommerce-network

  user-service:
    build: ./user-service
    depends_on:
      mysql:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - ecommerce-network

  product-service:
    build: ./product-service
    depends_on:
      mysql:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - ecommerce-network

  order-service:
    build: ./order-service
    depends_on:
      mysql:
        condition: service_started
      kafka:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - ecommerce-network

  inventory-service:
    build: ./inventory-service
    depends_on:
      mysql:
        condition: service_started
      kafka:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - ecommerce-network

  payment-service:
    build: ./payment-service
    depends_on:
      mysql:
        condition: service_started
      kafka:
        condition: service_started
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge