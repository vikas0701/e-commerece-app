# ---------------------------------------------------------
# BASIC SETTINGS
# ---------------------------------------------------------

# Application name (MUST match config file name in config-server)
spring.application.name=user-service

# Run on random port (good for scaling multiple instances)
#server.port=
server.port=8081


# ---------------------------------------------------------
# CONFIG SERVER CONNECTION
# ---------------------------------------------------------

# Location of config server
spring.config.import=optional:configserver:http://config-server:8888

# Enable config client
spring.cloud.config.enabled=true


# ---------------------------------------------------------
# EUREKA CONFIGURATION
# ---------------------------------------------------------

# Discovery server URL
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
# Register this service to Eureka
eureka.client.register-with-eureka=true

# Fetch registry
eureka.client.fetch-registry=true


# ---------------------------------------------------------
# ACTUATOR (OPTIONAL BUT GOOD)
# ---------------------------------------------------------


logging.level.org.springframework.cloud.config=DEBUG

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=60000

spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1




# expose actuator endpoints
management.endpoints.web.exposure.include=*

# enable prometheus endpoint
management.endpoint.prometheus.enabled=true

# show health details
management.endpoint.health.show-details=always

# add application name in metrics
management.metrics.tags.application=${spring.application.name}

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans